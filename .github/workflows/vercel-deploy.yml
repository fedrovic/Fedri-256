name: Build and Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: List build output
        run: |
          echo "Working directory: $(pwd)"
          echo "Root files:"; ls -la
          echo "Public directory files:"; if [ -d public ]; then find public -maxdepth 3 -type f -print; else echo 'public/ not found'; fi

      # Deployment is handled directly by Vercel Git integration.
      # Removed automated deploy step so Vercel will build from repo on push.
